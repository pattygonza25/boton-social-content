<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Ubuntu', sans-serif; }
.canvas {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background-image: url('https://images.unsplash.com/photo-1574180566232-aaad1b5b8450?w=1080&q=80');
  background-size: cover;
  background-position: center;
  padding: 80px;
}
.canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(106, 183, 234, 0.75);
  z-index: 0;
}
.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.main-text {
  font-family: 'Ubuntu', sans-serif;
  font-weight: 700;
  font-size: 48px;
  color: #1a1f5e;
  text-align: center;
  line-height: 1.2;
}
.sub-text {
  font-family: 'Ubuntu', sans-serif;
  font-weight: 400;
  font-size: 26px;
  color: rgba(26, 31, 94, 0.7);
  margin-top: 24px;
}
.logo {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  height: 44px;
  z-index: 1;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <p class="main-text">¿Tu mamá o tu papá te llamó tres veces hoy para preguntar lo mismo?</p>
    <p class="sub-text">No lo ignores. Es una señal.</p>
  </div>
  <img class="logo" src="Recurso_8.png" alt="Bot-On Logo">
</div>
</body>
</html>
