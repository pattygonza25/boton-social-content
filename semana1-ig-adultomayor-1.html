<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Ubuntu', sans-serif; }
.canvas {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background-color: #1a1f5e;
  padding: 80px;
}
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.main-text {
  font-family: 'Ubuntu', sans-serif;
  font-weight: 700;
  font-size: 52px;
  color: #ffffff;
  text-align: center;
  line-height: 1.2;
}
.sub-text {
  font-family: 'Ubuntu', sans-serif;
  font-weight: 300;
  font-size: 26px;
  color: rgba(255, 255, 255, 0.6);
  margin-top: 24px;
}
.logo {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  height: 44px;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="content">
    <p class="main-text">¿Fuiste a buscar algo y olvidaste qué era?</p>
    <p class="sub-text">La memoria se entrena. Todos los días.</p>
  </div>
  <img class="logo" src="Recurso_7.png" alt="Bot-On Logo">
</div>
</body>
</html>
